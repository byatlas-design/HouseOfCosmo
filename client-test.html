<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>house of cosmo ad test page</title>
    <style>
        :root {
            --bg: #110b2e;
            --bg-deep: #5136dc;
            --panel: rgba(14, 18, 30, 0.5);
            --panel-strong: rgba(18, 24, 38, 0.5);
            --text: #f2f1ee;
            --text-soft: rgba(242, 241, 238, 0.72);
            --text-muted: rgba(242, 241, 238, 0.58);
            --border: rgba(255, 255, 255, 0.16);
            --border-soft: rgba(255, 255, 255, 0.1);
            --border-strong: rgba(190, 206, 255, 0.42);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg-deep) 100%);
        }

        .page {
            width: min(1240px, 100%);
            margin: 0 auto;
            padding: 24px 18px 34px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            text-align: center;
        }

        .brand img {
            width: 190px;
            height: auto;
            object-fit: contain;
        }

        .brand p {
            margin: 0;
            color: var(--text-soft);
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
            align-items: start;
        }

        .panel {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.16) 0%, rgba(255, 255, 255, 0.05) 28%, rgba(255, 255, 255, 0.02) 100%),
                var(--panel);
            backdrop-filter: blur(14px) saturate(140%);
            -webkit-backdrop-filter: blur(14px) saturate(140%);
            box-shadow:
                0 18px 32px -26px rgba(0, 0, 0, 0.82),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .panel h2 {
            margin: 0 0 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-soft);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(242, 241, 238, 0.9);
        }

        .ad-wrap {
            width: 300px;
            max-width: 100%;
            margin: 0 auto;
        }

        .ad-wrap iframe {
            display: block;
            width: 100%;
            height: 600px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #0e1016;
            box-shadow: 0 12px 22px -18px rgba(0, 0, 0, 0.95);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 14px 0 10px;
            font-size: 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-soft);
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(242, 241, 238, 0.24) 0%, rgba(242, 241, 238, 0.02) 100%);
        }

        .section-title:first-of-type {
            margin-top: 4px;
        }

        .group-block {
            padding: 11px 12px 12px;
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            background:
                linear-gradient(150deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0.05) 36%, rgba(255, 255, 255, 0.02) 100%),
                rgba(14, 18, 30, 0.5);
            backdrop-filter: blur(10px) saturate(130%);
            -webkit-backdrop-filter: blur(10px) saturate(130%);
        }

        .group-block+.group-block {
            margin-top: 10px;
        }

        .group-title {
            margin: 0 0 4px;
            font-size: 11px;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: rgba(242, 241, 238, 0.92);
        }

        .group-note {
            margin: 0 0 10px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .video-grid,
        .static-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
        }

        .asset-card {
            padding: 10px;
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            background:
                linear-gradient(155deg, rgba(255, 255, 255, 0.16) 0%, rgba(255, 255, 255, 0.05) 34%, rgba(255, 255, 255, 0.02) 100%),
                var(--panel-strong);
            backdrop-filter: blur(10px) saturate(130%);
            -webkit-backdrop-filter: blur(10px) saturate(130%);
            transition: transform 160ms ease, border-color 180ms ease, background-color 180ms ease;
        }

        .asset-card:hover {
            transform: translateY(-2px);
            border-color: rgba(193, 206, 255, 0.4);
            background:
                linear-gradient(155deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.06) 34%, rgba(255, 255, 255, 0.03) 100%),
                rgba(28, 35, 56, 0.55);
        }

        .asset-card video {
            width: 100%;
            display: block;
            border-radius: 9px;
            border: 1px solid var(--border-soft);
            background: #07090f;
        }

        .static-frame {
            width: 100%;
            aspect-ratio: 300 / 250;
            border-radius: 9px;
            border: 1px solid var(--border-soft);
            background: #07090f;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .static-frame img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .asset-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 8px;
            padding: 6px 10px;
            border: 1px solid var(--border-soft);
            border-radius: 999px;
            font-size: 12px;
            letter-spacing: 0.01em;
            color: var(--text);
            text-decoration: none;
            background: rgba(255, 255, 255, 0.02);
            transition: border-color 180ms ease, background-color 180ms ease;
        }

        .asset-link:hover {
            border-color: var(--border-strong);
            background: rgba(183, 199, 255, 0.12);
        }

        @media (max-width: 980px) {
            .ad-wrap {
                margin: 0 auto;
            }
        }

        @media (max-width: 640px) {
            .page {
                padding: 16px 12px 22px;
            }

            .panel {
                padding: 12px;
            }

            .video-grid,
            .static-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <header class="brand">
            <img src="byatlas_logo_white.png" alt="byatlas" />
            <p>house of cosmo ad test page</p>
        </header>

        <main class="layout">
            <section class="panel assets-panel" aria-label="Individual ads panel">
                <h2>Individual Ads</h2>

                <h3 class="section-title">HTML5 Selector Ad</h3>
                <div class="group-block">
                    <p class="group-note">Interactive parfum selector ad unit.</p>
                    <div class="ad-wrap">
                        <iframe src="index.html" title="Cosmo interactive ad preview" loading="lazy"
                            allow="autoplay"></iframe>
                    </div>
                </div>

                <h3 class="section-title">Video Ad (300x600)</h3>
                <div class="group-block">
                    <div id="mainVideoGrid" class="video-grid"></div>
                </div>

                <h3 class="section-title">Static Ads</h3>
                <div class="group-block">
                    <div id="staticGrid" class="static-grid"></div>
                </div>

                <h3 class="section-title">AI Footage Tests</h3>
                <div class="group-block">
                    <p class="group-note">Firefly MP4 variations for AI footage testing.</p>
                    <div id="fireflyVideoGrid" class="video-grid"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const mainVideoFiles = [
            "300x600.mp4"
        ];

        const fireflyVideoFiles = [
            "Firefly_1.mp4",
            "Firefly_2.mp4",
            "Firefly_3.mp4",
            "Firefly_4.mp4",
            "Firefly_5.mp4"
        ];

        const jpgFiles = [
            "Cosmo-01.jpg",
            "Cosmo-02.jpg",
            "Cosmo-03.jpg",
            "Cosmo-04.jpg"
        ];

        const mainVideoGrid = document.getElementById("mainVideoGrid");
        const staticGrid = document.getElementById("staticGrid");
        const fireflyVideoGrid = document.getElementById("fireflyVideoGrid");

        function renderVideoCards(fileNames, host) {
            fileNames.forEach((fileName) => {
                const card = document.createElement("article");
                card.className = "asset-card";

                const video = document.createElement("video");
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                video.controls = true;
                video.preload = "metadata";
                video.src = fileName;

                const link = document.createElement("a");
                link.className = "asset-link";
                link.href = fileName;
                link.target = "_blank";
                link.rel = "noopener noreferrer";
                link.textContent = "Open video";

                card.appendChild(video);
                card.appendChild(link);
                host.appendChild(card);
            });
        }

        renderVideoCards(mainVideoFiles, mainVideoGrid);
        renderVideoCards(fireflyVideoFiles, fireflyVideoGrid);

        jpgFiles.forEach((fileName) => {
            const card = document.createElement("article");
            card.className = "asset-card";

            const imageFrame = document.createElement("div");
            imageFrame.className = "static-frame";

            const image = document.createElement("img");
            image.src = fileName;
            image.alt = `Static ad preview: ${fileName}`;
            image.loading = "lazy";

            const link = document.createElement("a");
            link.className = "asset-link";
            link.href = fileName;
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.textContent = "Open image";

            imageFrame.appendChild(image);
            card.appendChild(imageFrame);
            card.appendChild(link);
            staticGrid.appendChild(card);
        });
    </script>
</body>

</html>
